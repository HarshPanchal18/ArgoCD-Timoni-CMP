apiVersion: argoproj.io/v1alpha1
kind: ConfigManagementPlugin
metadata:
  name: argo-timoni-cmp
spec:
  init:
    command: []
    args: []
  generate:
    command: ["/bin/sh", "-c"]
    args:
      - |
        /usr/local/bin/timoni build ${ARGOCD_ENV_APP_NAME} . -f values-${ARGOCD_ENV_ENVIRONMENT}.cue -f image.cue
